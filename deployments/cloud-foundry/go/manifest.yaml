applications:
  - name: crypto-broker-go-cli
    instances: 1
    memory: 1G
    disk_quota: 1G
    buildpacks:
      - binary_buildpack
    health-check-type: process
    process_types: [web]
    env:
      OTEL_SERVICE_NAME: "test-app-go"
      OTEL_EXPORTER_OTLP_ENDPOINT: "localhost:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACES_EXPORTER: "otlpgrpc"
      OTEL_TRACES_SAMPLER: "always_on"
    command: './go-client-cli --loop 500 --profile=KAT_SHA3_512 hash "Welcome CryptoBroker"'

    sidecars:
      - name: otel-collector
        process_types: [web]
        command: ./otelcol --config=otel-config.yaml
        memory: 64M
      - name: crypto-broker-server
        health-check-type: process
        process_types: [web]
        env:
          OTEL_SERVICE_NAME: "test-crypto-broker-server"
          OTEL_EXPORTER_OTLP_ENDPOINT: "localhost:4317"
          OTEL_EXPORTER_OTLP_INSECURE: "true"
          OTEL_TRACES_EXPORTER: "otlp"
          OTEL_TRACES_SAMPLER: "always_on"
          OTEL_LOGS_EXPORTER: "otlpgrpc"
        command: 'CRYPTO_BROKER_PROFILES_DIR=$PWD ./cryptobroker-server'
      - name: crypto-broker-client-profile-default
        health-check-type: process
        process_types: [web]
        env:
          OTEL_SERVICE_NAME: "test-app-go-default-profile"
          OTEL_EXPORTER_OTLP_ENDPOINT: "localhost:4317"
          OTEL_EXPORTER_OTLP_INSECURE: "true"
          OTEL_TRACES_EXPORTER: "otlpgrpc"
          OTEL_TRACES_SAMPLER: "always_on"
        command: './go-client-cli --loop 600 --profile=Default sign --csr=certificates/test-csr/csr-rsa-2048.csr --caCert=certificates/test-ca/cert-test-CA-nist-secp384r1.pem --caKey=certificates/test-ca/test-CA-nist-secp384r1.pem'
      - name: crypto-broker-client-profile-fips-baseline
        health-check-type: process
        process_types: [web]
        env:
          OTEL_SERVICE_NAME: "test-app-go-fips-baseline-profile"
          OTEL_EXPORTER_OTLP_ENDPOINT: "localhost:4317"
          OTEL_EXPORTER_OTLP_INSECURE: "true"
          OTEL_TRACES_EXPORTER: "otlpgrpc"
          OTEL_TRACES_SAMPLER: "always_on"
        command: './go-client-cli --loop 700 --profile=FIPS-140-3-Baseline sign --csr=certificates/test-csr/csr-rsa-8192.csr --caCert=certificates/test-ca/cert-test-CA-rsa-3072.pem --caKey=certificates/test-ca/test-CA-rsa-3072.pem'
      - name: crypto-broker-client-profile-fips-strict
        health-check-type: process
        process_types: [web]
        env:
          OTEL_SERVICE_NAME: "test-app-go-fips-strict-profile"
          OTEL_EXPORTER_OTLP_ENDPOINT: "localhost:4317"
          OTEL_EXPORTER_OTLP_INSECURE: "true"
          OTEL_TRACES_EXPORTER: "otlpgrpc"
          OTEL_TRACES_SAMPLER: "always_on"
        command: './go-client-cli --loop 800 --profile=FIPS-140-3-Strict sign --csr=certificates/test-csr/csr-rsa-15380.csr --caCert=certificates/test-ca/cert-test-CA-nist-secp521r1.pem --caKey=certificates/test-ca/test-CA-nist-secp521r1.pem'
