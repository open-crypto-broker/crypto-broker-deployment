apiVersion: 1

# CF variant: all LGTM components run in the same container, so
# datasource URLs use localhost instead of Docker network service names.
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus-lgtm
    access: proxy
    url: http://localhost:9090
    isDefault: false

  - name: Loki
    type: loki
    uid: loki-lgtm
    access: proxy
    url: http://localhost:3100
    isDefault: true

  - name: Tempo
    type: tempo
    uid: tempo-lgtm
    access: proxy
    url: http://localhost:3200
    isDefault: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki-lgtm
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h
      tracesToMetrics:
        datasourceUid: prometheus-lgtm
