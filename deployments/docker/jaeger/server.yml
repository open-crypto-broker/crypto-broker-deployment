services:
  crypto-broker-server:
    container_name: crypto-broker-server
    image: ghcr.io/open-crypto-broker/server:${TAG:-dev}
    build:
      dockerfile: docker/Dockerfile
      context: ../../../crypto-broker-server
      args:
        CRYPTO_BROKER_PROFILES_DIR: example-profiles
    environment:
      - CRYPTO_BROKER_PROFILES_DIR=/app/profiles
      - OTEL_SERVICE_NAME=test-crypto-broker-server
      - OTEL_LOGS_EXPORTER=console,otlpgrpc
      - OTEL_TRACES_EXPORTER=otlpgrpc
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - OTEL_METRICS_EXPORTER=otlpgrpc
      - OTEL_METRICS_INTERVAL=10s
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    networks:
      - backend
    restart: always
    volumes:
      - shared_data:/tmp
volumes:
  shared_data:
